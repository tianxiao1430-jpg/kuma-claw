# .github/workflows/agent-bot.yml
# OpenClaw Bot - GitHub Issue 评论触发
# 用法：在 Issue 下评论 @claw [你的指令]

name: OpenClaw Bot

on:
  issue_comment:
    types: [created]

jobs:
  trigger:
    runs-on: ubuntu-latest
    # 只处理包含 @claw 的评论
    if: contains(github.event.comment.body, '@claw')
    
    steps:
      - name: Extract Prompt
        id: prompt
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          # 去掉 @claw 得到纯 Prompt
          PROMPT=$(echo "$COMMENT" | sed 's/@claw//' | xargs)

          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$PROMPT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Send to OpenClaw
        env:
          WEBHOOK_URL: ${{ vars.OPENCLAW_WEBHOOK_URL }}
          OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          PROMPT_TEXT: ${{ steps.prompt.outputs.text }}
          COMMENTER: ${{ github.event.comment.user.login }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Authorization: Bearer $OPENCLAW_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg repo "$REPO" \
              --argjson issue_number "${ISSUE_NUMBER}" \
              --arg issue_title "$ISSUE_TITLE" \
              --arg issue_body "$ISSUE_BODY" \
              --arg prompt "$PROMPT_TEXT" \
              --arg commenter "$COMMENTER" \
              --arg comment_url "$COMMENT_URL" \
              '{event:"mention",repository:$repo,issue_number:$issue_number,issue_title:$issue_title,issue_body:$issue_body,prompt:$prompt,commenter:$commenter,comment_url:$comment_url}')"
      
      - name: Confirm Received
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '👌 已收到，Claw 正在处理...'
            })
