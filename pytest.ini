[pytest]
# Pytest 配置
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步测试支持
asyncio_mode = auto

# 输出选项
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# 标记
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试

# 日志
log_cli = true
log_cli_level = INFO

# 覆盖率
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=kuma_claw
    --cov-report=term-missing
    --cov-report=html:htmlcov
